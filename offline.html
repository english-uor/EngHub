<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline • UoR Eng Dept</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #050B14;
            color: #ffffff;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 24px;
        }
        h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
        }
        p {
            color: #94a3b8;
            font-size: 1.1rem;
            line-height: 1.5;
            margin: 0 0 20px 0;
        }
        .retry-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        .retry-btn:active {
            transform: scale(0.95);
        }
        .retry-btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📡</h1>
        <h2>Connection Interrupted</h2>
        <p>You are currently offline or accessing a portal requiring an active network connection.</p>
        <button class="retry-btn" onclick="window.location.reload()">Retry Connection</button>
    </div>
</body>
</html>
